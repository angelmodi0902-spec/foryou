<!DOCTYPE html>
<html>
<head>
<title>for you 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg,#fbc2eb,#a6c1ee);
    font-family:'Quicksand';
}

.card {
    background:white;
    padding:30px;
    border-radius:20px;
    max-width:500px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

#text {
    white-space: pre-line;
    line-height:1.6;
}
</style>
</head>

<body>

<div class="card">
    <div id="text"></div>
</div>

<script>
const message = `hey cutie,

i love you okay? but very honestly i have lost interest which i believe can be regained overtime with efforts and memories.

i want to feel safe again, i want you to be my home,
i hope we’re on the same page and make it happen.

i want you to have everything you deserve adi, you’re so much more than what you get and i just don’t want to add on to your problems, you’re mera beta i obviously always want what’s the best for you and i want you to be the happiest baccha.

~ angel 💖`;

let i = 0;
function type() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(type, 30);
    }
}

type();
</script>

</body>
</html>
