<!DOCTYPE html>
<html>
<head>
<title>for you 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    font-family: 'Quicksand';
    color: white;
}

/* soft floating stars */
.star {
    position: absolute;
    color: white;
    font-size: 10px;
    opacity: 0.6;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 35px;
    border-radius: 20px;
    max-width: 500px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

#text {
    white-space: pre-line;
    line-height: 1.7;
    font-size: 16.5px;
}
</style>
</head>

<body>

<div class="card">
    <div id="text"></div>
</div>

<script>
const message = `hey cutie,

i love you okay? but very honestly i have lost interest which i believe can be regained overtime with efforts and memories.

i want to feel safe again, i want you to be my home, i hope we’re on the same page and make it happen.

i want you to have everything you deserve adi, you’re so much more than what you get and i just don’t want to add on to your problems, you’re mera beta i obviously always want what’s the best for you and i want you to be the happiest baccha.

~ angel 💖`;

let i = 0;

function type() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;

        // slower typing + pauses on punctuation
        let speed = 35;
        if (message.charAt(i) === "." || message.charAt(i) === ",") speed = 250;
        if (message.charAt(i) === "\n") speed = 400;

        setTimeout(type, speed);
    }
}

type();

/* floating stars effect */
setInterval(() => {
    let star = document.createElement("div");
    star.innerHTML = "✦";
    star.className = "star";
    star.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(star);

    setTimeout(() => star.remove(), 6000);
}, 500);
</script>

</body>
</html>
